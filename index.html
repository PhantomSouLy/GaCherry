<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GaCherry Database</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f1117;
color:white;
}

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(180deg,#ff84c7,#ff6ab8);
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px 20px;
}

.stat-card{
background:#181c25;
padding:20px;
border-radius:16px;
min-width:180px;
text-align:center;
}

.stat-number{
font-size:28px;
font-weight:bold;
color:#ff84c7;
}

.section{
padding:50px 20px;
max-width:1200px;
margin:auto;
}

.section h2{
margin-bottom:20px;
font-size:32px;
}

.rarity-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.rarity-card{
padding:25px;
border-radius:16px;
text-align:center;
font-weight:bold;
}

.common{
background:#4caf50;
}

.rare{
background:#2196f3;
}

.epic{
background:#9c27b0;
}

.legendary{
background:#ff9800;
}

.mythical{
background:#f5f5f5;
color:black;
}

.eternity{
background:#e53935;
}

.search-placeholder{
background:#181c25;
padding:30px;
border-radius:16px;
text-align:center;
}

.footer{
padding:30px;
text-align:center;
opacity:0.7;
}

</style>
</head>

<body>

<div class="hero">
<h1>🎴 GaCherry Database</h1>
<p>Official HappyCherryChan Discord Gacha Collection</p>
</div>

<div class="stats">

<div class="stat-card">
<div class="stat-number">600+</div>
Cards
</div>

<div class="stat-card">
<div class="stat-number">6</div>
Rarities
</div>

<div class="stat-card">
<div class="stat-number">∞</div>
Future Updates
</div>

</div>

<div class="section">

<h2>Rarities</h2>

<div class="rarity-grid">

<div class="rarity-card common">
⭐ Common
</div>

<div class="rarity-card rare">
⭐⭐ Rare
</div>

<div class="rarity-card epic">
⭐⭐⭐ Epic
</div>

<div class="rarity-card legendary">
⭐⭐⭐⭐ Legendary
</div>

<div class="rarity-card mythical">
⭐⭐⭐⭐⭐ Mythical
</div>

<div class="rarity-card eternity">
🔥 Eternity
</div>

</div>

</div>

<div class="section">

<h2>Card Database</h2>

<div class="search-placeholder">

🔍 Search system coming soon

<br><br>

Card gallery coming soon

</div>

</div>

<div class="footer">
GaCherry © HappyCherryChan
</div>

</body>
</html>
